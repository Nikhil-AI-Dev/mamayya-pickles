services:
  - type: web
    name: mamayya-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://mamayyapickles.com,https://www.mamayyapickles.com,http://mamayyapickles.com,http://www.mamayyapickles.com,https://nikhil-ai-dev.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: mamayya-db
          property: connectionString
      # Mailbox password for order emails; set in the Render dashboard.
      # Leave unset to skip emails entirely.
      - key: SMTP_PASS
        sync: false
      # Razorpay keys; leave unset to keep orders in test mode (no payment).
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: mamayya-db
    plan: free
