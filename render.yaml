services:
  - type: web
    name: mamayya-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://mamayyapickles.com,https://www.mamayyapickles.com,http://mamayyapickles.com,http://www.mamayyapickles.com,https://nikhil-ai-dev.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: mamayya-db
          property: connectionString

databases:
  - name: mamayya-db
    plan: free
